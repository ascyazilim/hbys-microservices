server:
  port: 8083 # Patient Service portu

spring:
  application:
    name: patient-service

  # Yeni Veritabanımız (patient_db)
  datasource:
    url: jdbc:postgresql://localhost:5433/patient_db
    username: hbbys_user
    password: hbbys_password
    driver-class-name: org.postgresql.Driver

  # FLYWAY AYARLARI EKLENDİ
  flyway:
    enabled: true
    baseline-on-migrate: true
    # Artık veritabanımız tamamen ayrı olduğu için özel bir history tablosu ismi vermemize gerek yok, varsayılanı kullanacak.

  # JPA / HIBERNATE AYARLARI (Kontrol Flyway'e geçti)
  jpa:
    hibernate:
      ddl-auto: validate # DİKKAT: update yerine validate yaptık!
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/hbys-realm

eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/